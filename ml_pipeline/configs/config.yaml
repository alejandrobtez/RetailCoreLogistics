# =============================================================================
# RetailCore Logistics — ML Pipeline Config (Azure Edition)
# =============================================================================

project:
  name: "retailcore-delivery-prediction"
  version: "2.0.0"
  description: "Predicción de fallos de entrega antes de las 7:00 AM"

# ---------------------------------------------------------------------------
# AZURE — Recursos centrales e Infraestructura
# ---------------------------------------------------------------------------
azure:
  subscription_id: "4721a86d-41f8-4d7d-8bef-a7fd78462488"
  resource_group: "BenitezBernaAlejandro"

  storage:
    account_name: "logisticstoragegenai"
    containers:
      raw_data: "data"
      processed: "data"
      models: "models"
      reports: "reports"

  postgres:
    server: "logistic-server.postgres.database.azure.com"
    database: "logistic-predictions"
    port: 5432
    tables:
      predictions: "delivery_predictions"
      model_metrics: "model_metrics"
      drift_alerts: "drift_alerts"

  mlflow:
    tracking_uri: "azureml://swedencentral.api.azureml.ms/mlflow/v1.0/subscriptions/4721a86d-41f8-4d7d-8bef-a7fd78462488/resourceGroups/BenitezBernaAlejandro/providers/Microsoft.MachineLearningServices/workspaces/logisticml"
    experiment_name: "retailcore-delivery-prediction"
    register_best_model: true
    model_name: "retailcore-best-model"

  ml_workspace:
    name: "logisticml"

  key_vault:
    name: "logisticml7006738115"
    secrets:
      aemet_key: "aemet-api-key"
      postgres_conn: "postgres-connection-string"
      storage_conn: "storage-connection-string"

# ---------------------------------------------------------------------------
# Paths locales
# ---------------------------------------------------------------------------
paths:
  local_tmp: "/tmp/retailcore"
  logs: "logs"

# ---------------------------------------------------------------------------
# Datos
# ---------------------------------------------------------------------------
data:
  filename: "raw/deliveries_synthetic.csv"
  target: "delivery_failed"
  exclude_cols: ["delivery_id", "recipient_id", "delivery_failed"]
  test_size: 0.2
  val_size: 0.1
  random_state: 42

# ---------------------------------------------------------------------------
# AEMET (Clima)
# ---------------------------------------------------------------------------
aemet:
  base_url: "https://opendata.aemet.es/openapi/api"
  stations:
    madrid: "3195"
    barcelona: "0076"
    valencia: "8416"
    sevilla: "5783"
  feature_mapping:
    prec: "weather_rain"
    vv: "weather_wind_speed"
    ta: "weather_temperature"
  thresholds:
    strong_wind_ms: 10.0
    adverse_weather_rain_mm: 5.0

# ---------------------------------------------------------------------------
# Modelos
# ---------------------------------------------------------------------------
models:
  random_state: 42
  candidates:
    logistic_regression:
      enabled: true
      C: 0.1
      max_iter: 500
    random_forest:
      enabled: true
      n_estimators: 300
      max_depth: 12
      min_samples_leaf: 10
    xgboost:
      enabled: true
      n_estimators: 400
      max_depth: 6
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8

# ---------------------------------------------------------------------------
# Evaluación
# ---------------------------------------------------------------------------
evaluation:
  primary_metric: "avg_precision"
  threshold_search:
    min: 0.2
    max: 0.7
    step: 0.02

# ---------------------------------------------------------------------------
# Inferencia
# ---------------------------------------------------------------------------
inference:
  batch_size: 18000
  schedule_time: "06:50"
  risk_levels:
    high:
      threshold_multiplier: 1.3
      action: "REAGENDAR_SMS"
    medium:
      threshold_multiplier: 1.0
      action: "CAMBIAR_FRANJA"
    low:
      action: "ENTREGA_NORMAL"

# ---------------------------------------------------------------------------
# Monitorización
# ---------------------------------------------------------------------------
monitoring:
  drift_threshold: 0.05
  min_samples_for_drift: 1000
