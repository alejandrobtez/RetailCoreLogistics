<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2e4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#00bcf2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g opacity="0.07" stroke="#00bcf2" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="200" fill="url(#accent)" rx="3"/>

  <!-- Package icon area -->
  <rect x="30" y="60" width="80" height="80" fill="none" stroke="#0078d4" stroke-width="2" rx="8" opacity="0.6"/>
  <rect x="40" y="75" width="60" height="50" fill="#0078d4" opacity="0.15" rx="4"/>
  <line x1="30" y1="95" x2="110" y2="95" stroke="#00bcf2" stroke-width="1.5" opacity="0.8"/>
  <circle cx="70" cy="110" r="8" fill="none" stroke="#00bcf2" stroke-width="2" filter="url(#glow)"/>
  <text x="70" y="115" text-anchor="middle" fill="#00bcf2" font-size="10" font-weight="bold">📦</text>

  <!-- Route dots -->
  <circle cx="700" cy="60" r="5" fill="#0078d4" filter="url(#glow)"/>
  <circle cx="750" cy="90" r="5" fill="#00bcf2" filter="url(#glow)"/>
  <circle cx="800" cy="70" r="5" fill="#0078d4" filter="url(#glow)"/>
  <circle cx="840" cy="110" r="5" fill="#00bcf2" filter="url(#glow)"/>
  <circle cx="780" cy="130" r="5" fill="#0078d4" filter="url(#glow)"/>
  <polyline points="700,60 750,90 800,70 840,110 780,130" fill="none" stroke="#00bcf2" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Main title -->
  <text x="135" y="90" fill="white" font-size="32" font-weight="700" letter-spacing="-0.5">RetailCore</text>
  <text x="135" y="90" fill="url(#accent)" font-size="32" font-weight="700" letter-spacing="-0.5" opacity="0.4" dx="2" dy="2">RetailCore</text>
  <text x="135" y="125" fill="#00bcf2" font-size="22" font-weight="300" letter-spacing="2">LOGISTICS</text>

  <!-- Subtitle -->
  <text x="135" y="155" fill="#8899aa" font-size="13" letter-spacing="0.5">Predictor de Fallos en Entrega · Last Mile AI · Tajamar 2025-26</text>

  <!-- Tag badges -->
  <rect x="135" y="165" width="70" height="22" rx="11" fill="#0078d4" opacity="0.25"/>
  <text x="170" y="181" fill="#00bcf2" font-size="11" text-anchor="middle">Azure ML</text>

  <rect x="215" y="165" width="60" height="22" rx="11" fill="#0078d4" opacity="0.25"/>
  <text x="245" y="181" fill="#00bcf2" font-size="11" text-anchor="middle">FastAPI</text>

  <rect x="285" y="165" width="55" height="22" rx="11" fill="#0078d4" opacity="0.25"/>
  <text x="312" y="181" fill="#00bcf2" font-size="11" text-anchor="middle">SHAP</text>

  <rect x="350" y="165" width="70" height="22" rx="11" fill="#0078d4" opacity="0.25"/>
  <text x="385" y="181" fill="#00bcf2" font-size="11" text-anchor="middle">XGBoost</text>
</svg>
